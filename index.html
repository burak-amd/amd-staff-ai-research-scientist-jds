<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff AI Research Scientist — Job Descriptions</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --bg: #0b0f14;
      --surface: #121a26;
      --accent: #38bdf8;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #2a3a52;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
    }
    main { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 0.35rem; }
    p.sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .cards { display: grid; gap: 0.85rem; }
    a.card {
      display: block;
      padding: 1.1rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
    }
    a.card:hover { border-color: var(--accent); }
    a.card strong { display: block; color: var(--accent); font-size: 0.95rem; margin-bottom: 0.35rem; }
    a.card span { color: var(--muted); font-size: 0.88rem; }
  </style>
</head>
<body>
  <main>
    <h1>Staff AI Research Scientist</h1>
    <p class="sub">Santa Clara, CA · Two role variants</p>
    <div class="cards">
      <a class="card" href="optimization.html">
        <strong>Variant A — Verifiable optimization</strong>
        <span>Measurable code optimization tasks for complex engineering workflows.</span>
      </a>
      <a class="card" href="hitl-debugging.html">
        <strong>Variant B — Slow HITL debugging</strong>
        <span>Debugging where verification is human-in-the-loop and reward is slow.</span>
      </a>
    </div>
  </main>
</body>
</html>
